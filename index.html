<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Pick Helper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --card: #111827;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --accent: #f59e0b;
            --text: #e5e7eb;
            --text-light: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
            background-attachment: fixed;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .form-card {
            background: var(--card);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(59, 130, 246, 0.2);
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            color: var(--accent);
        }

        select, input[type="text"] {
            width: 100%;
            padding: 0.9rem 1rem;
            margin-bottom: 1.5rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
        }

        .result-section {
            background: var(--card);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .result-title {
            color: var(--accent);
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
        }

        .recommendation {
            background: #1e293b;
            padding: 1rem 1.5rem;
            margin: 0.8rem 0;
            border-radius: 10px;
            border-left: 5px solid var(--primary);
            transition: all 0.2s;
        }

        .recommendation:hover {
            transform: translateX(8px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }

        .error {
            color: #ef4444;
            font-weight: bold;
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Dota 2 Pick Helper</h1>
            <p class="subtitle">Подбери сильный пик против врагов</p>
        </header>

        <div class="form-card">
            <form method="POST">
                <label>Твоя роль</label>
                <select name="role">
                    <option value="1">Carry</option>
                    <option value="2">Mid</option>
                    <option value="3">Offlane</option>
                    <option value="4">Soft Support</option>
                    <option value="5">Hard Support</option>
                </select>

                <label>Враги (через запятую)</label>
                <input type="text" name="enemies" value="Medusa, Storm Spirit, Mars" required>

                <button type="submit">Подобрать пики</button>
            </form>
        </div>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if recommendations %}
            <div class="result-section">
                <h2 class="result-title">Рекомендованные герои</h2>
                {% for rec in recommendations %}
                    <div class="recommendation">{{ rec }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <footer>
            Powered by OpenDota API · Школьный проект 2026
        </footer>
    </div>
</body>
</html>
